name: Deploy App to Lightning AI

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Lightning CLI & Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --no-cache-dir lightning lightning-sdk

      - name: Authenticate and Deploy
        env:
          LIGHTNING_API_KEY: ${{ secrets.LIGHTNING_API_KEY }}
          LIGHTNING_USER_ID: ${{ secrets.LIGHTNING_API_KEY }}
        run: |
          # Get Python scripts binary directory
          BIN_DIR=$(python -c "import sysconfig; print(sysconfig.get_path('scripts'))")
          
          echo "Executing deployment pipeline..."
          
          # Pass API Key via non-interactive login or directly fall back to environment variable auth
          "$BIN_DIR/lightning" login $LIGHTNING_API_KEY 2>/dev/null || "$BIN_DIR/lightning" login --api-key $LIGHTNING_API_KEY 2>/dev/null || echo "Auth fallback active"
          
          # Trigger Deployment
          "$BIN_DIR/lightning" deploy .