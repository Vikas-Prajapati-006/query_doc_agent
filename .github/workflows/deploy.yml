name: Deploy App to Lightning AI

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Project Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install lightning lightning-sdk
          # Install project requirements so Python can import src components
          if [ -f requirements.txt ]; then pip install --no-cache-dir -r requirements.txt; fi

      - name: Pre-build Setup & Deploy
        env:
          LIGHTNING_API_KEY: ${{ secrets.LIGHTNING_API_KEY }}
          PYTHONPATH: .
        run: |
          BIN_DIR=$(python -c "import sysconfig; print(sysconfig.get_path('scripts'))")
          
          echo "Executing pre-deploy components..."
          # Running component initializations if needed before spin-up
          python test_agent.py || true
          
          echo "Deploying Streamlit App to Lightning..."
          "$BIN_DIR/lightning" deploy app app.py --name query-doc-agent || "$BIN_DIR/lightning" deploy .