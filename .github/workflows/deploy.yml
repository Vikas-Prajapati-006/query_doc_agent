name: Deploy App to Lightning AI

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install lightning lightning-sdk

      - name: Authenticate and Deploy
        env:
          LIGHTNING_API_KEY: ${{ secrets.LIGHTNING_API_KEY }}
        run: |
          BIN_DIR=$(python -c "import sysconfig; print(sysconfig.get_path('scripts'))")
          
          # Detect app entrypoint file (app.py or main.py or fallback)
          APP_FILE="app.py"
          if [ ! -f "app.py" ]; then
            if [ -f "main.py" ]; then
              APP_FILE="main.py"
            fi
          fi

          echo "Deploying file: $APP_FILE"
          
          # Run deployment directly on entrypoint file
          "$BIN_DIR/lightning" deploy $APP_FILE || "$BIN_DIR/lightning" run app $APP_FILE