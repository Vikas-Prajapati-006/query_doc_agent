name: Deploy App to Lightning AI

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Lightning & Deploy
        env:
          LIGHTNING_API_KEY: ${{ secrets.LIGHTNING_API_KEY }}
        run: |
          python -m pip install --upgrade pip
          python -m pip install lightning lightning-sdk

          # Directly execute the binary from python's bin directory in SAME step
          PYTHON_BIN_DIR=$(python -c "import sysconfig; print(sysconfig.get_path('scripts'))")
          echo "Binary path is: $PYTHON_BIN_DIR"
          
          # Login and Deploy directly using absolute binary path
          "$PYTHON_BIN_DIR/lightning" login --api-key $LIGHTNING_API_KEY
          "$PYTHON_BIN_DIR/lightning" deploy .