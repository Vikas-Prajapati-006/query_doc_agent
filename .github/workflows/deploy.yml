name: Deploy App to Lightning AI

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies & Editable Package
        run: |
          python -m pip install --upgrade pip
          pip install --no-cache-dir lightning lightning-sdk
          
          if [ -f requirements.txt ]; then
            pip install --no-cache-dir -r requirements.txt
          fi
          
          if [ -f setup.py ]; then
            pip install -e .
          fi

      - name: Execute Artifact Generation & Verification
        env:
          PYTHONPATH: .
        run: |
          echo "Checking/Creating FAISS index and DB seeding..."
          python -c "from src.components.upload_data import DataIngestion; DataIngestion().initiate_data_ingestion()" || true
          python test_agent.py || true

      - name: Authenticate and Deploy to Lightning AI
        env:
          LIGHTNING_API_KEY: ${{ secrets.LIGHTNING_API_KEY }}
          PYTHONPATH: .
        run: |
          BIN_DIR=$(python -c "import sysconfig; print(sysconfig.get_path('scripts'))")
          
          echo "Deploying Streamlit App to Lightning AI Cloud..."
          "$BIN_DIR/lightning" deploy app.py --name query-doc-agent